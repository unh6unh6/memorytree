<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Tree</title>
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div id="app">

    <!-- 상단 내비게이션 바 -->
    <nav class="navbar" id="navbar">
      <a class="navbar__brand" href="#explorer">
        <svg class="navbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="navbar__title">Memory Tree</span>
      </a>

      <div class="navbar__actions">
        <button class="navbar__action-btn navbar__action-btn--labeled" id="io-import-btn" aria-haspopup="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Import</span>
        </button>
        <button class="navbar__action-btn navbar__action-btn--labeled" id="io-export-btn" aria-haspopup="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Export</span>
        </button>
      </div>
      <input type="file" id="io-file-input" accept=".json" style="display:none">
      <input type="file" id="io-file-input-md" accept=".md,.markdown" style="display:none">
    </nav>

    <!-- Explorer 화면 -->
    <div class="view" data-view="explorer">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__header">탐색기</div>
        <div class="sidebar__search-bar">
          <svg class="sidebar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            id="sidebar-search"
            class="sidebar__search-input"
            placeholder="노드 검색..."
            autocomplete="off"
            aria-label="노드 검색"
          />
        </div>
        <div class="sidebar__body" id="sidebar-body"></div>
      </aside>
      <div class="sidebar-resizer" id="sidebar-resizer" title="드래그하여 너비 조절"></div>
      <main class="canvas-area" id="canvas-area"></main>
    </div>

    <!-- 질문/답변 모아보기 화면 -->
    <div class="view" data-view="list">
      <div class="list-container" id="list-container"></div>
    </div>

    <!-- 테스트 모드 화면 -->
    <div class="view" data-view="test">
      <div class="test-container" id="test-container"></div>
    </div>

    <!-- 공통 모달 -->
    <div class="modal-backdrop" id="modal-backdrop" hidden>
      <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal__header">
          <h2 class="modal__title" id="modal-title"></h2>
          <button class="modal__close" id="modal-close" aria-label="모달 닫기">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal__body" id="modal-body"></div>
        <div class="modal__footer" id="modal-footer"></div>
      </div>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

  </div>

  <script type="module" src="src/scripts/app.js"></script>
</body>
</html>
